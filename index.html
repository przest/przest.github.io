<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Ejemplo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>Hospital Ejemplo</h1>
        </div>
    </header>

    <main class="container">
        <h2>Nuestras Especialidades</h2>
        <p>Seleccione una especialidad para ver nuestros profesionales.</p>
        
        <div id="specialties-container" class="specialties-container">
            </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="close-modal" class="close">&times;</span>
            <h2 id="modal-doctor-name">Nombre del Doctor</h2>
            
            <div class="doctor-live-status">
                Atendiendo ahora: <strong id="doctor-now-serving">--</strong>
            </div>

            <div class="form-group">
                <label for="appointment-date">Fecha:</label>
                <input type="date" id="appointment-date">
            </div>

            <h3>Horarios disponibles</h3>
            <div id="time-slots" class="time-slots"></div>

            <div class="action-section">
                <button id="book-btn" class="btn-primary" disabled>Pedir Turno</button>
            </div>

            <div id="result-message" class="result-message hidden"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <button id="chatbot-toggle" class="chatbot-toggle">💬 Asistente Médico</button>

    <div id="chatbot-window" class="chatbot-window hidden">
        <div class="chatbot-header">
            Triaje Virtual
            <span id="close-chat" class="close-chat">&times;</span>
        </div>
        <div id="chat-messages" class="chat-messages">
            <div class="message bot-message">Hola, soy el asistente del hospital. ¿Qué síntomas tienes o qué te duele?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Ej: Me duele el pecho...">
            <button id="send-chat" class="btn-primary" style="padding: 0.5rem 1rem;">Enviar</button>
        </div>
    </div>
</body>
</html>
